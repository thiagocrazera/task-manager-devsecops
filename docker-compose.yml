services:
  task-manager:
    build: .
    container_name: task-manager-devsecops
    ports:
      - "5000:5000"
    environment:
      ADMIN_USER: admin
      ADMIN_PASSWORD: admin123

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-devsecops
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - task-manager

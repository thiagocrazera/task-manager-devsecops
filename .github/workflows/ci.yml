name: CI/CD DevSecOps

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  build-test-security-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Executar testes automatizados
        run: pytest -q

      - name: SAST com Bandit
        run: bandit -r app.py -ll

      - name: Análise de dependências com pip-audit
        run: pip-audit -r requirements.txt

      - name: Build da imagem Docker
        run: docker build -t task-manager-devsecops:ci .

      - name: Deploy em ambiente de estágio
        run: |
          docker run -d --name task-manager-stage -p 5000:5000 task-manager-devsecops:ci
          sleep 5
          docker ps

      - name: Validação pós-deploy em stage
        run: |
          curl -f http://localhost:5000/health
          docker logs task-manager-stage --tail 20

      - name: DAST pós-deploy com OWASP ZAP
        run: |
          mkdir -p zap-actions
          docker run --rm -t \
            --network host \
            -v "$(pwd)/zap-actions:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://127.0.0.1:5000 \
            -r zap-stage-report.html \
            -w zap-stage-report.md \
            -I

      - name: Publicar relatório ZAP como artefato
        uses: actions/upload-artifact@v4
        with:
          name: zap-stage-report
          path: zap-actions/
